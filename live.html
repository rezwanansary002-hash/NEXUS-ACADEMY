<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Class — NEXUS ACADEMY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
      body, html {
        margin: 0; padding: 0; height: 100%; overflow: hidden;
        background: #000; font-family: 'Montserrat', sans-serif;
      }
      .live-container {
        display: flex; flex-direction: column; height: 100vh;
      }
      .live-header {
        background: #111; padding: 10px 20px;
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 1px solid rgba(212, 175, 55, 0.3);
      }
      .live-header .logo { font-weight: 700; color: var(--gold); letter-spacing: 1px; }
      #jitsi-container { flex: 1; width: 100%; background: #000; }
      .controls { padding: 10px; display: flex; gap: 10px; }
      .exit-btn {
        background: #ff4444; color: white; border: none;
        padding: 8px 16px; border-radius: 8px; cursor: pointer;
        font-weight: 600; font-size: 0.9rem;
      }
      .exit-btn:hover { background: #cc0000; }
      
      /* Mobile adjustments */
      @media (max-width: 600px) {
        .live-header { padding: 8px 12px; }
        .live-header .logo { font-size: 0.9rem; }
      }
    </style>
  </head>
  <body>
    <div class="live-container">
      <header class="live-header">
        <div class="logo">NEXUS ACADEMY LIVE</div>
        <button class="exit-btn" id="exitLive">EXIT CLASS</button>
      </header>
      <div id="jitsi-container"></div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const roomName = urlParams.get('room') || 'NexusAcademy_LiveClass';
      const userName = urlParams.get('user') || 'Student';
      const role = urlParams.get('role') || 'student'; // 'teacher' or 'student'

      const domain = "meet.jit.si";
      const options = {
        roomName: roomName,
        width: "100%",
        height: "100%",
        parentNode: document.querySelector("#jitsi-container"),
        userInfo: {
          displayName: userName
        },
        configOverwrite: {
          startWithAudioMuted: role === 'student',
          startWithVideoMuted: role === 'student',
          prejoinPageEnabled: false,
          disableInviteFunctions: true,
          enableWelcomePage: false,
        },
        interfaceConfigOverwrite: {
          TOOLBAR_BUTTONS: [
            'microphone', 'camera', 'closedcaptions', 'desktop', 'fullscreen',
            'fodeviceselection', 'hangup', 'profile', 'chat', 'recording',
            'livestreaming', 'etherpad', 'sharedvideo', 'settings', 'raisehand',
            'videoquality', 'filmstrip', 'invite', 'feedback', 'stats', 'shortcuts',
            'tileview', 'videobackgroundblur', 'download', 'help', 'mute-everyone',
            'security'
          ],
          SHOW_JITSI_WATERMARK: false,
          SHOW_WATERMARK_FOR_GUESTS: false,
          DEFAULT_BACKGROUND: '#0B0B0B',
          DISPLAY_WELCOME_PAGE_CONTENT: false,
        }
      };

      const api = new JitsiMeetExternalAPI(domain, options);

      // Handle exit
      document.getElementById('exitLive').addEventListener('click', () => {
        api.executeCommand('hangup');
        window.history.back();
      });

      // Redirect on hangup
      api.addEventListener('videoConferenceLeft', () => {
        window.history.back();
      });
    </script>
  </body>
</html>
